<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: transparent !important;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            user-select: none;
        }

        #wrapper {
            width: 800px;
            height: 500px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none; /* Controlled by Lua */
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 30px;
            background: #111;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .header .status { font-size: 11px; color: #4CAF50; text-transform: uppercase; }

        .main {
            flex: 1;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            overflow-y: auto;
        }

        .feature-card {
            background: #161616;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222;
            transition: all 0.2s;
        }

        .feature-card:hover { border-color: #444; background: #1a1a1a; }

        .feature-title { font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 12px; }

        /* Modern Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(20px); }

        .button {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .button:hover { background: #333; border-color: #444; }

        .button-group { display: flex; gap: 8px; margin-top: 10px; }

        .slider-input { width: 100%; margin-top: 10px; accent-color: #4CAF50; cursor: pointer; }

        .footer {
            padding: 10px 30px;
            background: #0d0d0d;
            border-top: 1px solid #222;
            font-size: 10px;
            color: #444;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div class="header">
            <div>
                <h1>ARCHITECT</h1>
                <p style="font-size: 10px; color: #555;">SYSTEM LOADED</p>
            </div>
            <span class="status">● Active</span>
        </div>

        <div class="main">
            <!-- Self Options -->
            <div class="feature-card">
                <div class="feature-title">Self Utilities</div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span>Godmode</span>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleFeature('godmode', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Ghost</span>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleFeature('ghostmode', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="button" style="margin-top: 15px;" onclick="clickButton('revive')">Revive / Heal</button>
            </div>

            <!-- Weapon Options -->
            <div class="feature-card">
                <div class="feature-title">Weaponry</div>
                <button class="button" onclick="clickButton('give_weapons')">Give Combat Kit</button>
                <div style="margin-top: 15px;">
                    <span style="font-size: 11px; color: #666;">Fire Rate Factor</span>
                    <input type="range" class="slider-input" min="1" max="10" value="1" oninput="sliderChange('fire_rate', this.value)">
                </div>
            </div>

            <!-- World/Other -->
            <div class="feature-card">
                <div class="feature-title">Movement</div>
                <div style="margin-top: 5px;">
                    <span style="font-size: 11px; color: #666;">Speed Factor</span>
                    <input type="range" class="slider-input" min="1" max="50" value="10" oninput="sliderChange('speed', this.value)">
                </div>
                <button class="button" style="margin-top: 15px; background: #822;" onclick="clickButton('close_menu')">Unload System</button>
            </div>
        </div>

        <div class="footer">
            <span>Architect External v1.0.4</span>
            <span>Local Build: 2026.04.05</span>
        </div>
    </div>

    <script>
        // Handle Lua Messages
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === "toggle_ui") {
                document.getElementById('wrapper').style.display = data.visible ? 'flex' : 'none';
            }
        });

        // Communication back to Lua
        function post(url, data) {
            fetch(`https://architect/${url}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(e => console.log('Lua post error:', e));
        }

        function toggleFeature(name, state) { post('toggle_feature', { name, state }); }
        function clickButton(name) { post('button_click', { name }); }
        function sliderChange(name, value) { post('slider_change', { name, value }); }
    </script>
</body>
</html>
